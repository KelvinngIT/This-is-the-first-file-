name: 每天自動運行 Colab Notebook 並存到 Google Drive

on:
  schedule:
    - cron: '30 0 * * *'        # 每天香港時間早上 8:30 執行 (UTC 00:30)
  workflow_dispatch:            # 可手動測試

jobs:
  run-colab-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: 簽出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: |
          pip install papermill
          # 在這裡加上你 notebook 需要的套件，例如：
          # pip install pandas numpy matplotlib requests

      - name: 執行你的 Colab Notebook
        run: papermill my_colab_notebook.ipynb executed_notebook.ipynb --progress-bar

      # 可選：把 notebook 產生的所有結果打包（推薦）
      - name: 打包所有輸出檔案
        run: |
          zip -r results.zip executed_notebook.ipynb *.csv *.png *.jpg *.txt  # 改成你實際產生的檔案類型

      # 上傳到 Google Drive（支援多檔案）
      - name: 上傳結果到 Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          filename: results.zip                     # 或用通配符: "*.ipynb" 或 "executed_notebook.ipynb"
          parent_folder_id: '你的資料夾ID'          # 例如 1aBcDeFgHiJkLmNoPqRsTuVwXyZ
          name: "每日記錄-${{ github.run_number }}-${{ format('yyyy-MM-dd', github.event.schedule) }}.zip"   # 自訂檔名
          overwrite: true